baseURL = 'https://rahulseetharaman.github.io/'
languageCode = 'en-us'
title = 'Rahul Seetharaman'
copyright = 'Rahul Seetharaman'
enableRobotsTXT = true

[module]
  [[module.imports]]
    path = "github.com/michenriksen/hugo-theme-til"

  [[module.imports]]
    path = 'github.com/hugomods/images'
    disable = false

[outputs]
  home = ['html']
  section = ['html', 'rss', 'json']
  page = ['html']

[menus]
  [[menus.main]]
    identifier = "about"
    name = "About"
    pageRef = "/about"
    weight = 10

  [[menus.main]]
    name = 'Notes'
    pageRef = '/notes'
    weight = 20
  
  [[menus.main]]
    name = 'Posts'
    pageRef = '/posts'
    weight = 30
  
  [[menus.main]]
    name = 'Graph'
    pageRef = '/graph'
    weight = 40

[markup]
  [markup.highlight]
    noClasses = false
    style = 'tokyonight-night'

  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
    [markup.goldmark.renderer]
      unsafe = true

[params]
  [params.author]
    name = 'Rahul Seetharaman'
    email = 'rahulseetharaman@gmail.com'

  [params.footer]
    creativeCommonsLicense = 'by_sa'

  [params.robotstxt]
    blockCC = true
    blockAI = true
